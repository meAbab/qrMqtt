# qrMqtt v2 production-oriented configuration.
# Keep this file readable only by the service user if it contains credentials.

device_id = front-door

mqtt.host = mqtt.example.net
mqtt.port = 8883
mqtt.client_id = qrmqtt-front-door
mqtt.topic_prefix = qrMqtt/devices/front-door
mqtt.username = front-door
mqtt.password = change-me
mqtt.tls_enabled = true
mqtt.ca_file = /etc/qrMqtt/certs/ca.crt
# Set both values when the broker requires mutual TLS.
mqtt.cert_file =
mqtt.key_file =
mqtt.qos = 1
mqtt.message_expiry_seconds = 60
mqtt.spool_file = /var/lib/qrMqtt/outbox.tsv

camera.device_index = 0
camera.frame_delay_ms = 100
camera.duplicate_window_seconds = 10

# Supply the secret at runtime with QRMQTT_HMAC_SECRET instead of storing it here.
security.require_signed_tokens = true
security.hmac_secret =
security.nonce_file = /var/lib/qrMqtt/consumed-nonces.tsv
